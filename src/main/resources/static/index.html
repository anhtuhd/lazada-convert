<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazada Affiliate Converter</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06020f 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-glow: rgba(123, 97, 255, 0.15);
            --primary: #7b61ff;
            --primary-hover: #917aff;
            --primary-glow: rgba(123, 97, 255, 0.4);
            --secondary: #ff3e6c;
            --secondary-hover: #ff577e;
            --secondary-glow: rgba(255, 62, 108, 0.4);
            --text-main: #f3f1fe;
            --text-muted: #9f9bbd;
            --success: #00e676;
            --success-glow: rgba(0, 230, 118, 0.2);
            --error: #ff3d00;
            --error-glow: rgba(255, 61, 0, 0.2);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated decorative background glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation: float-orb 15s infinite alternate;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation: float-orb 12s infinite alternate-reverse;
        }

        @keyframes float-orb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 680px;
            z-index: 10;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #a594ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 18px;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .form-control {
            width: 100%;
            padding: 16px 20px 16px 48px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 15px var(--glass-glow);
        }

        .form-control:focus + i.input-icon {
            color: var(--primary);
        }

        .form-control::placeholder {
            color: rgba(159, 155, 189, 0.5);
        }

        /* Collapsible Advanced section */
        .advanced-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 0;
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .advanced-toggle:hover {
            color: var(--primary-hover);
        }

        .advanced-toggle i {
            transition: var(--transition);
        }

        .advanced-toggle.active i {
            transform: rotate(180deg);
        }

        .advanced-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .advanced-content.open {
            max-height: 120px;
            margin-bottom: 20px;
        }

        .advanced-content .form-group {
            margin-bottom: 0;
        }

        .advanced-content .form-control {
            padding: 12px 16px 12px 38px;
            font-size: 0.9rem;
        }

        .advanced-content i.input-icon {
            left: 14px;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .advanced-content {
                grid-template-columns: 1fr;
                max-height: 0;
            }
            .advanced-content.open {
                max-height: 320px;
            }
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary), #8f79ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--primary-glow);
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px var(--primary-glow);
            background: linear-gradient(90deg, var(--primary-hover), #9d87ff);
        }

        .btn-submit:hover::after {
            left: 125%;
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Spinner for loading state */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Area */
        .result-container {
            margin-top: 30px;
            display: none;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            border-radius: 16px;
            padding: 24px;
            border-width: 1px;
            border-style: solid;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-card.success {
            background: rgba(0, 230, 118, 0.04);
            border-color: rgba(0, 230, 118, 0.2);
            box-shadow: 0 8px 32px var(--success-glow);
        }

        .result-card.error {
            background: rgba(255, 61, 0, 0.04);
            border-color: rgba(255, 61, 0, 0.2);
            box-shadow: 0 8px 32px var(--error-glow);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .result-header i {
            font-size: 1.5rem;
        }

        .result-card.success .result-header i {
            color: var(--success);
        }

        .result-card.error .result-header i {
            color: var(--error);
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .result-url-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 14px 16px;
            gap: 12px;
        }

        .result-url {
            flex-grow: 1;
            font-family: monospace;
            font-size: 0.95rem;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: all;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-copy:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .result-error-msg {
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.5;
        }

        .result-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: 4px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            z-index: 10;
        }

        footer a {
            color: var(--primary-hover);
            text-decoration: none;
            transition: var(--transition);
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <h1>Lazada Affiliate Tool</h1>
            <p>Convert products links into short tracking affiliate URLs instantly</p>
        </header>

        <div class="card">
            <form id="convert-form">
                <div class="form-group">
                    <label for="product-url">LAZADA PRODUCT URL</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-link input-icon"></i>
                        <input type="url" id="product-url" class="form-control" required 
                               placeholder="https://www.lazada.vn/products/sp-i123456.html"
                               autocomplete="off">
                    </div>
                </div>

                <button type="button" class="advanced-toggle" id="adv-toggle">
                    <i class="fa-solid fa-chevron-down"></i> Advanced Sub-IDs (Optional)
                </button>

                <div class="advanced-content" id="adv-content">
                    <div class="form-group">
                        <label for="sub-id-1">Sub ID 1</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tag input-icon"></i>
                            <input type="text" id="sub-id-1" class="form-control" placeholder="Source / Campaign">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="sub-id-2">Sub ID 2</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tag input-icon"></i>
                            <input type="text" id="sub-id-2" class="form-control" placeholder="Platform / Placement">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="sub-id-3">Sub ID 3</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tag input-icon"></i>
                            <input type="text" id="sub-id-3" class="form-control" placeholder="Ad Set / Creative">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="spinner" id="btn-spinner"></span>
                    <span id="btn-text"><i class="fa-solid fa-wand-magic-sparkles"></i> Convert Link</span>
                </button>
            </form>

            <div class="result-container" id="result-container">
                <!-- Will be dynamically populated -->
            </div>
        </div>

        <footer>
            <p>Powered by Java Spring Boot & Lazada Open API | Configured with environment variables</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('convert-form');
        const advToggle = document.getElementById('adv-toggle');
        const advContent = document.getElementById('adv-content');
        const btnSubmit = document.getElementById('btn-submit');
        const btnSpinner = document.getElementById('btn-spinner');
        const btnText = document.getElementById('btn-text');
        const resultContainer = document.getElementById('result-container');

        // Toggle Advanced Section
        advToggle.addEventListener('click', () => {
            advToggle.classList.toggle('active');
            advContent.classList.toggle('open');
        });

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading state
            btnSubmit.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.innerHTML = 'Converting...';
            resultContainer.style.display = 'none';

            const productUrl = document.getElementById('product-url').value.trim();
            const subId1 = document.getElementById('sub-id-1').value.trim();
            const subId2 = document.getElementById('sub-id-2').value.trim();
            const subId3 = document.getElementById('sub-id-3').value.trim();

            const requestPayload = {
                productUrl,
                subId1: subId1 || null,
                subId2: subId2 || null,
                subId3: subId3 || null
            };

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestPayload)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errMsg = 'API Error';
                    try {
                        const errJson = JSON.parse(errorText);
                        errMsg = errJson.message || errMsg;
                    } catch (e) {
                        errMsg = errorText || errMsg;
                    }
                    throw new Error(errMsg);
                }

                const data = await response.json();
                renderResult(data);

            } catch (err) {
                renderError(err.message || 'Could not connect to service');
            } finally {
                // UI Reset State
                btnSubmit.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Convert Link';
            }
        });

        function renderResult(data) {
            if (data.success) {
                resultContainer.innerHTML = `
                    <div class="result-card success">
                        <div class="result-header">
                            <i class="fa-solid fa-circle-check"></i>
                            <span class="result-title">Conversion Successful</span>
                        </div>
                        <div class="result-url-box">
                            <div class="result-url" id="converted-url">${data.affiliateLink}</div>
                            <button class="btn-copy" id="btn-copy" onclick="copyLink()">
                                <i class="fa-regular fa-copy"></i> <span id="copy-text">Copy</span>
                            </button>
                        </div>
                        <div class="result-meta">
                            <span>Request ID: ${data.requestId || 'N/A'}</span>
                            <span>Target: Lazada VN</span>
                        </div>
                    </div>
                `;
            } else {
                resultContainer.innerHTML = `
                    <div class="result-card error">
                        <div class="result-header">
                            <i class="fa-solid fa-circle-xmark"></i>
                            <span class="result-title">Conversion Failed</span>
                        </div>
                        <div class="result-error-msg">
                            ${data.errorMessage || 'Unknown error occurred during conversion'}
                        </div>
                        <div class="result-meta">
                            <span>Request ID: ${data.requestId || 'N/A'}</span>
                        </div>
                    </div>
                `;
            }
            resultContainer.style.display = 'block';
        }

        function renderError(message) {
            resultContainer.innerHTML = `
                <div class="result-card error">
                    <div class="result-header">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span class="result-title">Server / Network Error</span>
                    </div>
                    <div class="result-error-msg">
                        ${message}
                    </div>
                </div>
            `;
            resultContainer.style.display = 'block';
        }

        window.copyLink = function() {
            const urlText = document.getElementById('converted-url').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                const copyBtn = document.getElementById('btn-copy');
                const copyText = document.getElementById('copy-text');
                
                copyBtn.style.background = 'var(--success)';
                copyBtn.style.borderColor = 'var(--success)';
                copyBtn.style.color = 'white';
                copyText.innerText = 'Copied!';
                
                setTimeout(() => {
                    copyBtn.style.background = 'rgba(255, 255, 255, 0.08)';
                    copyBtn.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                    copyBtn.style.color = 'var(--text-main)';
                    copyText.innerText = 'Copy';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
