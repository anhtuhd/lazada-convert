# ============================================================
#  Lazada Affiliate Link Converter - Application Configuration
# ============================================================

# --- Lazada Open Platform Credentials ---
# Lấy từ: https://isvconsole.lazada.com/apps/console/apps
lazada.app-key=${LAZADA_APP_KEY:your_app_key_here}
lazada.app-secret=${LAZADA_APP_SECRET:your_app_secret_here}

# OAuth Access Token của tài khoản Affiliate
# Lấy bằng cách thực hiện luồng OAuth 2.0, hoặc từ Affiliate dashboard
lazada.access-token=${LAZADA_ACCESS_TOKEN:your_access_token_here}

# Gateway URL (mặc định cho VN là api.lazada.com/rest)
# Các region khác: api.lazada.sg / api.lazada.com.my / api.lazada.co.th / ...
lazada.gateway-url=${LAZADA_GATEWAY_URL:https://api.lazada.com/rest}

# API path cho việc tạo affiliate link
lazada.affiliate-api-path=/affiliate/generateShortLink

# --- Server ---
server.port=${PORT:8080}

# --- Logging ---
logging.level.com.example.lazadaaffiliate=INFO
logging.level.org.springframework.web=WARN
